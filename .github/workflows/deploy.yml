name: Deploy on AWS Self-Hosted Runner

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - auto-sync-excel

    env:
      APP_DIR: /var/www/auto-sync-excel
      APP_PORT: 3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Node.js
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: npm run check

      - name: Activate release
        run: |
          set -euo pipefail

          RELEASE_DIR="$APP_DIR/releases/$GITHUB_SHA"
          mkdir -p "$RELEASE_DIR"

          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='outputs' \
            --exclude='*.pem' \
            ./ "$RELEASE_DIR/"

          cd "$RELEASE_DIR"
          npm ci --omit=dev
          mkdir -p outputs

          ln -sfn "$RELEASE_DIR" "$APP_DIR/current"
          sudo systemctl restart auto-sync-excel

          for attempt in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:$APP_PORT/health" >/dev/null; then
              echo "Health check passed"
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Health check failed"
              sudo systemctl status auto-sync-excel --no-pager || true
              sudo journalctl -u auto-sync-excel -n 120 --no-pager || true
              exit 1
            fi

            sleep 1
          done

          find "$APP_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
