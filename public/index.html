<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Sync Excel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="toolbar">
        <div>
          <p class="eyebrow">Auto Sync Excel</p>
          <h1>Đồng bộ tồn kho vào danh mục</h1>
        </div>
        <div class="status-pill" id="statusPill">Sẵn sàng</div>
      </section>

      <section class="workspace">
        <form id="syncForm" class="sync-panel">
          <div class="section-heading">
            <div>
              <h2>Chọn file</h2>
              <p>Nguồn là báo cáo tồn kho, đích là file danh mục cần cập nhật.</p>
            </div>
          </div>

          <div class="drop-grid">
            <label class="drop-zone" data-drop-zone="source">
              <input id="sourceInput" name="source" type="file" accept=".xls,.xlsx" />
              <span class="step-badge">1</span>
              <span class="drop-icon">↥</span>
              <span class="drop-title">File tồn kho</span>
              <span class="drop-note">Kéo thả hoặc bấm để chọn</span>
              <span class="file-name" id="sourceName">Chưa chọn file</span>
            </label>

            <label class="drop-zone" data-drop-zone="target">
              <input id="targetInput" name="target" type="file" accept=".xls,.xlsx" />
              <span class="step-badge">2</span>
              <span class="drop-icon">▣</span>
              <span class="drop-title">File danh mục</span>
              <span class="drop-note">File mẫu cần ghi dữ liệu</span>
              <span class="file-name" id="targetName">Chưa chọn file</span>
            </label>
          </div>

          <div class="section-heading compact">
            <div>
              <h2>Tùy chọn</h2>
            </div>
          </div>

          <div class="options">
            <label>
              <span>Sheet nguồn</span>
              <input name="sourceSheet" type="text" placeholder="Bỏ trống để lấy sheet đầu tiên" />
            </label>
            <label>
              <span>Sheet đích</span>
              <input name="targetSheet" type="text" placeholder="Bỏ trống để lấy sheet đầu tiên" />
            </label>
            <label class="wide">
              <span>Khóa ghép</span>
              <input name="key" type="text" value="MA_LR,SO_LO,MA_BHYT,HAN_DUNG" />
            </label>
            <label class="wide">
              <span>Tên file kết quả</span>
              <input name="outputName" type="text" value="danh-muc-da-dong-bo.xlsx" />
            </label>
          </div>

          <div class="actions">
            <button id="syncButton" class="primary-button" type="submit">
              <span>↧</span>
              Đồng bộ và tải file
            </button>
            <a id="downloadLink" class="download-link" hidden>Tải lại file kết quả</a>
          </div>
        </form>

        <aside class="info-panel">
          <div class="mapping-panel">
            <div class="panel-heading">
              <div>
                <h2>Mapping</h2>
                <p id="mappingModeText">Đang khóa chỉnh sửa</p>
              </div>
              <div class="mapping-header-actions">
                <button class="secondary-button" id="editMappingButton" type="button">✎ Sửa</button>
                <button class="secondary-button success-button" id="saveMappingButton" type="button" hidden>✓ Lưu</button>
                <button class="secondary-button" id="cancelMappingButton" type="button" hidden>Hủy</button>
              </div>
            </div>
            <input id="mappingJson" name="mappingJson" type="hidden" form="syncForm" />
            <table class="mapping-table">
              <thead>
                <tr>
                  <th>Cột báo cáo</th>
                  <th>Cột danh mục</th>
                  <th class="mapping-actions">Xóa</th>
                </tr>
              </thead>
              <tbody id="mappingBody"></tbody>
            </table>
            <div class="mapping-tools" id="mappingTools" hidden>
              <button class="secondary-button" id="addMappingButton" type="button">+ Thêm dòng</button>
              <button class="secondary-button danger-light-button" id="resetMappingButton" type="button">Khôi phục mặc định</button>
            </div>
          </div>

          <div class="result-card" id="resultCard" hidden>
            <h2>Kết quả</h2>
            <dl>
              <div><dt>Bản ghi nguồn</dt><dd id="sourceRecords">0</dd></div>
              <div><dt>Cập nhật</dt><dd id="updatedRows">0</dd></div>
              <div><dt>Thêm mới</dt><dd id="addedRows">0</dd></div>
              <div><dt>Định dạng ngày</dt><dd>yyyy-mm-dd</dd></div>
            </dl>
          </div>
        </aside>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
